version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    assignees:
      - "TeaChris"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      production-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        dependency-type: "development"
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    assignees:
      - "TeaChris"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "TeaChris"
    commit-message:
      prefix: "build"
